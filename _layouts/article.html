---
layout: default
---
<section class="section article-section">
  <div class="container">
    <article class="article-card">
      <header class="article-header">
        <p class="article-label">
          {% if page.lang == 'en' %}Research article{% else %}Исследовательская статья{% endif %}
        </p>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
          <p class="article-description">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="article-content">
        {{ content }}
      </div>
    </article>
  </div>
</section>
