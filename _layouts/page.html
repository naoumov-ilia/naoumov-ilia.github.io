---
layout: default
---
<section class="section page-section">
  <div class="container">
    <div class="page-card">
      <header class="page-header">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
          <p class="page-description">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="page-content">
        {{ content }}
      </div>
    </div>
  </div>
</section>
